# ==============================================================================
# Playbook : baseline_linux_servers.yml
# Entreprise : ATLOS
# ==============================================================================
#
# Ce playbook applique la configuration de base (baseline) à tous les serveurs Linux.
# Il appelle le rôle common_linux qui installe les paquets de base, configure
# le MOTD, la timezone, la locale, etc.
#
# Ce playbook est la première étape du déploiement sur un nouveau serveur.
# Il doit être exécuté avant les autres playbooks spécifiques (nginx, wazuh, etc.).
# ==============================================================================

---
- name: Application de la configuration de base Linux
  hosts: linux_servers
  become: yes
  gather_facts: yes

  roles:
    # ------------------------------------------------------------------------------
    # Rôle : common_linux
    # ------------------------------------------------------------------------------
    # Ce rôle configure les éléments de base communs à tous les serveurs Linux :
    # - Installation des paquets de base (curl, vim, git, htop, etc.)
    # - Configuration du MOTD (Message Of The Day)
    # - Configuration de la timezone système
    # - Configuration de la locale système
    # - Configuration des limites système (ulimit)
    # - Création du répertoire de logs applicatifs
    # - Configuration des alias bash globaux
    #
    # Les variables sont définies dans group_vars/linux_servers.yml et peuvent être
    # surchargées dans group_vars/all.yml ou host_vars.
    - role: common_linux
