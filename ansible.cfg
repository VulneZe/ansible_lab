# ==============================================================================
# Configuration Ansible pour le projet ATLOS ansible-lab
# ==============================================================================
#
# Ce fichier configure le comportement par défaut d'Ansible pour ce projet.
# Les options définies ici sont orientées apprentissage et bonnes pratiques.
#
# Documentation complète : https://docs.ansible.com/ansible/latest/reference_appendices/config.html
# ==============================================================================

[defaults]

# ------------------------------------------------------------------------------
# Chemin de l'inventaire
# ------------------------------------------------------------------------------
# Définit l'inventaire par défaut utilisé par Ansible.
# Dans ce projet multi-environnement, nous utilisons des inventaires séparés
# par environnement (dev, staging, prod). Ce chemin pointe vers dev par défaut.
# Pour cibler un autre environnement, utilisez : -i inventories/staging
inventory = inventories/dev/hosts.ini

# ------------------------------------------------------------------------------
# Chemin des rôles
# ------------------------------------------------------------------------------
# Liste des chemins où Ansible cherche les rôles.
# "roles" indique que les rôles sont dans le dossier ./roles/ relatif au playbook.
# Cela évite l'erreur "role not found" quand les playbooks sont dans playbooks/
roles_path = roles

# ------------------------------------------------------------------------------
# Vérification des clés hôtes SSH
# ------------------------------------------------------------------------------
# False = Ansible n'ajoute pas automatiquement les hôtes à known_hosts.
# True = Plus sécurisé mais demande une validation manuelle au premier accès.
# En environnement d'apprentissage/lab, False simplifie les tests.
# EN PRODUCTION : Toujours mettre True pour éviter les attaques MITM.
host_key_checking = False

# ------------------------------------------------------------------------------
# Comportement de récupération des facts
# ------------------------------------------------------------------------------
# caching peut accélérer les playbooks en évitant de récupérer les facts à chaque exécution.
# Pour un lab, nous désactivons le caching pour voir les facts frais à chaque run.
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 86400

# ------------------------------------------------------------------------------
# Gestion des erreurs
# ------------------------------------------------------------------------------
# any_errors_fatal = True arrête l'exécution dès la première erreur sur un hôte.
# any_errors_fatal = False continue sur les autres hôtes même si un échoue.
# Pour un lab, False permet de voir tous les résultats.
any_errors_fatal = False

# ------------------------------------------------------------------------------
# Affichage des tâches
# ------------------------------------------------------------------------------
# display_skipped_hosts = False cache l'affichage des tâches sautées (plus propre).
# display_ok_hosts = True montre les tâches réussies (utile pour l'apprentissage).
display_skipped_hosts = False
display_ok_hosts = True

# ------------------------------------------------------------------------------
# Timeout et retries
# ------------------------------------------------------------------------------
# timeout = 30 secondes pour les connexions SSH par défaut.
timeout = 30

# ------------------------------------------------------------------------------
# Journalisation
# ------------------------------------------------------------------------------
# log_path = /var/log/ansible/ansible.log (décommenter pour activer le logging)
# Utile pour le dépannage en production.
# log_path = /var/log/ansible/ansible.log

# ------------------------------------------------------------------------------
# Privilege escalation (become)
# ------------------------------------------------------------------------------
# become = True active l'escalade de privilèges par défaut pour toutes les tâches.
# Pour ce lab, nous préférons spécifier become: yes dans les playbooks pour plus de clarté.
# become = True
# become_method = sudo
# become_user = root
# become_ask_pass = False

# ==============================================================================
# Section ssh_connection
# ==============================================================================
[ssh_connection]

# ------------------------------------------------------------------------------
# Méthode de transfert de fichiers
# ------------------------------------------------------------------------------
# scp = plus stable mais plus lent pour les petits fichiers
# sftp = plus rapide, préféré par défaut dans les versions récentes d'Ansible
# pipelining = True améliore les performances en réduisant les connexions SSH
pipelining = True

# ------------------------------------------------------------------------------
# Contrôle des erreurs SSH
# ------------------------------------------------------------------------------
# ssh_args = arguments supplémentaires passés à ssh
# -o ControlMaster=auto -o ControlPersist=60s : réutilise les connexions SSH
# -o StrictHostKeyChecking=no : désactive la vérification stricte des clés hôtes
# ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

# ==============================================================================
# Section privilege_escalation
# ==============================================================================
[privilege_escalation]

# ------------------------------------------------------------------------------
# Configuration de become
# ------------------------------------------------------------------------------
# become = True : active l'escalade de privilèges
# become_method = sudo : méthode d'escalade (sudo, su, pbrun, etc.)
# become_user = root : utilisateur cible de l'escalade
# become_ask_pass = False : ne demande pas le mot de passe become
# Ces paramètres peuvent être surchargés dans les playbooks avec become: yes
# become = True
# become_method = sudo
# become_user = root
# become_ask_pass = False
