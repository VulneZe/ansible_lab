# ==============================================================================
# Tâches du rôle wazuh_agent
# Entreprise : ATLOS
# ==============================================================================
#
# Ce rôle installe et configure l'agent Wazuh sur les serveurs Linux.
# Installation réelle pour Debian/Ubuntu (incluant Kali Linux).
#
# Documentation officielle :
# https://documentation.wazuh.com/current/deployment-options/deploy-wazuh-agent/index.html
# ==============================================================================

---
# ------------------------------------------------------------------------------
# 1. Affichage du mode d'exécution
# ------------------------------------------------------------------------------
# Cette tâche affiche le mode d'exécution.
- name: Affichage du mode d'exécution
  ansible.builtin.debug:
    msg:
      - "Installation réelle de Wazuh Agent"

# ------------------------------------------------------------------------------
# 2. Téléchargement du package Wazuh Agent
# ------------------------------------------------------------------------------
# Téléchargement du package .deb depuis le site officiel Wazuh.
- name: Téléchargement du package Wazuh Agent
  ansible.builtin.get_url:
    url: "https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_{{ wazuh_agent_version }}-1_amd64.deb"
    dest: /tmp/wazuh-agent.deb
    mode: '0644'
  when:
    - ansible_os_family == "Debian"
    - wazuh_agent_enabled | bool
  become: yes

# ------------------------------------------------------------------------------
# 3. Installation de Wazuh Agent avec variables d'environnement
# ------------------------------------------------------------------------------
# Installation du package avec les variables WAZUH_MANAGER et WAZUH_AGENT_NAME.
- name: Installation de Wazuh Agent
  ansible.builtin.apt:
    deb: /tmp/wazuh-agent.deb
    state: present
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_address }}"
    WAZUH_AGENT_NAME: "{{ inventory_hostname }}"
  when:
    - ansible_os_family == "Debian"
    - wazuh_agent_enabled | bool
  become: yes

# ------------------------------------------------------------------------------
# 4. Démarrage et activation du service Wazuh Agent
# ------------------------------------------------------------------------------
# Démarrage du service wazuh-agent et activation au démarrage.
# L'installation avec les variables d'environnement configure automatiquement l'agent.
- name: Démarrage et activation du service Wazuh Agent
  ansible.builtin.service:
    name: "{{ wazuh_agent_service_name }}"
    state: "{{ wazuh_agent_service_state }}"
    enabled: "{{ wazuh_agent_service_enabled }}"
  when:
    - wazuh_agent_enabled | bool
  become: yes

# ------------------------------------------------------------------------------
# 5. Vérification du statut du service
# ------------------------------------------------------------------------------
# Vérification que le service wazuh-agent est bien démarré.
- name: Vérification du statut du service Wazuh Agent
  ansible.builtin.command:
    cmd: systemctl status wazuh-agent
  when:
    - wazuh_agent_enabled | bool
  become: yes
  register: wazuh_status
  changed_when: false

# ------------------------------------------------------------------------------
# 6. Affichage du résumé
# ------------------------------------------------------------------------------
# Cette tâche affiche un résumé de la configuration appliquée.
- name: Affichage du résumé de configuration
  ansible.builtin.debug:
    msg:
      - "Rôle wazuh_agent appliqué (installation réelle)"
      - "Manager Wazuh : {{ wazuh_manager_address }}"
      - "Service wazuh-agent : {{ wazuh_agent_service_state }}"
      - "Pour vérifier l'inscription : https://{{ wazuh_manager_address }}"
