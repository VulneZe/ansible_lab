# ==============================================================================
# Tâches du rôle wazuh_agent
# Entreprise : ATLOS
# ==============================================================================
#
# IMPORTANT : Ce rôle est une SIMULATION PÉDAGOGIQUE.
# Une installation réelle de Wazuh Agent nécessite :
# - L'ajout des dépôts Wazuh officiels
# - L'installation des paquets wazuh-agent
# - La configuration de l'agent (ossec.conf)
# - L'enregistrement auprès du Wazuh Manager
# - La gestion du service wazuh-agent
#
# Pour une installation réelle en production, consultez la documentation officielle :
# https://documentation.wazuh.com/current/deployment-options/deploy-wazuh-agent/index.html
# ==============================================================================

---
# ------------------------------------------------------------------------------
# 1. Vérification du mode d'exécution
# ------------------------------------------------------------------------------
# Cette tâche affiche le mode d'exécution (simulation ou real).
- name: Affichage du mode d'exécution
  ansible.builtin.debug:
    msg:
      - "Rôle wazuh_agent en mode : {{ wazuh_agent_mode }}"
      - "ATTENTION : Mode simulation = installation pédagogique, pas d'agent Wazuh réel"

# ------------------------------------------------------------------------------
# 2. Installation des paquets de base (simulation)
# ------------------------------------------------------------------------------
# En mode simulation, nous installons des paquets de base qui seraient
# nécessaires pour une installation réelle de Wazuh Agent.
# En mode real, cette tâche serait remplacée par l'installation des paquets Wazuh.
- name: Installation des paquets de base (simulation)
  ansible.builtin.apt:
    name: "{{ wazuh_agent_simulation_packages }}"
    state: present
    update_cache: yes
  when:
    - ansible_os_family == "Debian"
    - wazuh_agent_mode == "simulation"
    - wazuh_agent_enabled | bool
  become: yes

# ------------------------------------------------------------------------------
# 3. Installation réelle de Wazuh Agent (mode real - à adapter)
# ------------------------------------------------------------------------------
# Cette tâche est un exemple de ce que serait une installation réelle.
# Elle est désactivée par défaut et doit être adaptée selon la documentation Wazuh.
- name: Installation réelle de Wazuh Agent (mode real - à adapter)
  ansible.builtin.debug:
    msg:
      - "Mode real non implémenté dans cette version pédagogique"
      - "Pour une installation réelle, consultez : https://documentation.wazuh.com/"
  when:
    - wazuh_agent_mode == "real"
    - wazuh_agent_enabled | bool

