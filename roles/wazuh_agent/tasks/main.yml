# ------------------------------------------------------------------------------
# 8. Affichage d'un résumé
# ------------------------------------------------------------------------------
# Cette tâche affiche un résumé de la configuration appliquée.
- name: Affichage du résumé de configuration
  ansible.builtin.debug:
    msg:
      - "Rôle wazuh_agent appliqué (mode simulation)"
      - "Manager Wazuh : {{ wazuh_manager_address }}:{{ wazuh_manager_port }}"
      - "Répertoire d'installation : {{ wazuh_agent_install_dir }}"
      - "Fichier de configuration : {{ wazuh_agent_config_file }}"
      - "ATTENTION : Ceci est une simulation pédagogique"
      - "Pour une installation réelle, adaptez le rôle selon la documentation Wazuh"
