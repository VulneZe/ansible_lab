# ------------------------------------------------------------------------------
# 4. Création du répertoire d'installation (simulation)
# ------------------------------------------------------------------------------
# En mode simulation, nous créons le répertoire où Wazuh Agent serait installé.
# Cela permet de montrer la structure sans installer le logiciel réel.
- name: Création du répertoire d'installation (simulation)
  ansible.builtin.file:
    path: "{{ wazuh_agent_install_dir }}"
    state: directory
    owner: "{{ wazuh_agent_user }}"
    group: "{{ wazuh_agent_group }}"
    mode: '0755'
  when:
    - wazuh_agent_mode == "simulation"
    - wazuh_agent_enabled | bool
  become: yes

# ------------------------------------------------------------------------------
# 5. Création du répertoire de logs (simulation)
# ------------------------------------------------------------------------------
# En mode simulation, nous créons le répertoire où Wazuh Agent stockerait ses logs.
- name: Création du répertoire de logs (simulation)
  ansible.builtin.file:
    path: "{{ wazuh_agent_log_dir }}"
    state: directory
    owner: "{{ wazuh_agent_user }}"
    group: "{{ wazuh_agent_group }}"
    mode: '0755'
  when:
    - wazuh_agent_mode == "simulation"
    - wazuh_agent_enabled | bool
  become: yes

# ------------------------------------------------------------------------------
# 6. Création d'un fichier de configuration exemple (simulation)
# ------------------------------------------------------------------------------
# En mode simulation, nous créons un fichier de configuration exemple
# pour montrer à quoi ressemblerait ossec.conf.
- name: Création du fichier de configuration exemple (simulation)
  ansible.builtin.copy:
    content: |
      <!--
        Fichier de configuration Wazuh Agent (SIMULATION PÉDAGOGIQUE)
        Ce fichier est un exemple et ne doit PAS être utilisé en production.
        
        Pour une configuration réelle, consultez la documentation :
        https://documentation.wazuh.com/current/deployment-options/deploy-wazuh-agent/index.html
      -->
      <ossec_config>
        <client>
          <server>
            <address>{{ wazuh_manager_address }}</address>
            <port>{{ wazuh_manager_port }}</port>
            <protocol>tcp</protocol>
          </server>
          <config>
            <auto_enrollment>
              <enabled>yes</enabled>
              <agent_name>{{ inventory_hostname }}</agent_name>
              <groups>linux,servers</groups>
            </auto_enrollment>
          </config>
        </client>
        
        <!-- Configuration de la surveillance des fichiers -->
        <syscheck>
          <disabled>no</disabled>
          <frequency>3600</frequency>
          <directories check_all="yes">/etc,/usr/bin,/usr/sbin</directories>
        </syscheck>
        
        <!-- Configuration de la surveillance des processus -->
        <rootcheck>
          <disabled>no</disabled>
          <check_files>/etc/passwd,/etc/shadow</check_files>
        </rootcheck>
        
        <!-- Configuration de la remontée des logs système -->
        <localfile>
          <log_format>syslog</log_format>
          <location>/var/log/syslog</location>
        </localfile>
        
        <!-- Configuration de la remontée des logs d'authentification -->
        <localfile>
          <log_format>syslog</log_format>
          <location>/var/log/auth.log</location>
        </localfile>
      </ossec_config>
    dest: "{{ wazuh_agent_config_file }}"
    owner: "{{ wazuh_agent_user }}"
    group: "{{ wazuh_agent_group }}"
    mode: '0644'
  when:
    - wazuh_agent_mode == "simulation"
    - wazuh_agent_enabled | bool
  become: yes

# ------------------------------------------------------------------------------
# 7. Gestion du service Wazuh Agent (simulation)
# ------------------------------------------------------------------------------
# En mode simulation, nous n'essayons pas de gérer un service qui n'existe pas.
# En mode real, cette tâche gérerait le service wazuh-agent.
- name: Gestion du service Wazuh Agent (simulation)
  ansible.builtin.debug:
    msg:
      - "Service Wazuh Agent non géré en mode simulation"
      - "En mode real, le service serait démarré et activé"
  when:
    - wazuh_agent_mode == "simulation"
    - wazuh_agent_enabled | bool

