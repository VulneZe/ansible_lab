# ==============================================================================
# Handlers du rôle wazuh_agent
# Entreprise : ATLOS
# ==============================================================================
#
# Ce fichier contient les handlers pour le rôle wazuh_agent.
# Les handlers sont des actions qui ne s'exécutent que lorsqu'une tâche
# les notifie via le mot-clé "notify".
#
# Pour l'installation réelle de Wazuh Agent, nous avons un handler pour
# redémarrer le service wazuh-agent après une modification de configuration.
#
# Documentation sur les handlers : https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_handlers.html
# ==============================================================================

---
# ------------------------------------------------------------------------------
# Handler : Redémarrer wazuh-agent
# ------------------------------------------------------------------------------
# Ce handler redémarre le service Wazuh Agent.
# Il est notifié par les tâches de modification de configuration
# pour que les modifications soient prises en compte.
- name: Redémarrer wazuh-agent
  ansible.builtin.service:
    name: "{{ wazuh_agent_service_name }}"
    state: restarted
  become: yes
