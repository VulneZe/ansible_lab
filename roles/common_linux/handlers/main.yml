#
# Ce fichier contient les handlers pour le rôle common_linux.
# Les handlers sont des actions qui ne s'exécutent que lorsqu'une tâche
# les notifie via le mot-clé "notify". Ils sont typiquement utilisés
# pour redémarrer des services après une modification de configuration.
