# Pour le rôle common_linux, nous n'avons pas besoin de handlers pour l'instant
# car nous ne gérons pas de services spécifiques. Ce fichier est vide mais
# conservé pour la structure standard d'un rôle Ansible.
#
# Documentation sur les handlers : https://docs.ansible.com/ansible/latest/playbook_guide/playbooks_handlers.html
# ==============================================================================

