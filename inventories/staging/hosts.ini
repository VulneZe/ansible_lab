# ==============================================================================
# Inventaire Ansible pour l'environnement STAGING
# Entreprise : ATLOS
# ==============================================================================
#
# Ce fichier définit les hôtes et les groupes pour l'environnement de staging.
# L'environnement staging sert à valider les changements avant production.
#
# Documentation sur les inventaires : https://docs.ansible.com/ansible/latest/inventory_guide/
# ==============================================================================

# ------------------------------------------------------------------------------
# Groupe : linux_simulation
# ------------------------------------------------------------------------------
# Ce groupe contient les machines de simulation/validation.
# En environnement staging, nous avons une machine Kali Linux pour les tests.
#
# atlos-staging-kali-01 : Nom logique de la machine de simulation
# ansible_host : IP réelle de la machine
# ansible_user : Utilisateur SSH pour la connexion
# ansible_python_interpreter : Chemin vers Python 3 sur la cible
#
[linux_simulation]
atlos-staging-kali-01 ansible_host=172.20.10.6 ansible_user=ansible ansible_python_interpreter=/usr/bin/python3

# ------------------------------------------------------------------------------
# Groupe : linux_servers
# ------------------------------------------------------------------------------
# Ce groupe contient TOUS les serveurs Linux de l'environnement staging.
# C'est un groupe "parent" qui inclut d'autres groupes via :children
#
[linux_servers:children]
linux_simulation

# ------------------------------------------------------------------------------
# Remarques sur l'environnement staging
# ------------------------------------------------------------------------------
# - Les configurations sont proches de la production
# - Les données sont des données de test, pas de production
# - Les changements sont validés ici avant déploiement en prod
# - L'accès peut être plus restreint qu'en dev
