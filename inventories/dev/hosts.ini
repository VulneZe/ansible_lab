# ==============================================================================
# Inventaire Ansible pour l'environnement DEV
# Entreprise : ATLOS
# ==============================================================================
#
# Ce fichier définit les hôtes et les groupes pour l'environnement de développement.
# Format INI simple et lisible, idéal pour l'apprentissage.
#
# Documentation sur les inventaires : https://docs.ansible.com/ansible/latest/inventory_guide/
# ==============================================================================

# ------------------------------------------------------------------------------
# Groupe : wazuh_managers
# ------------------------------------------------------------------------------
# Ce groupe contient les serveurs qui hébergent Wazuh Manager.
# En environnement dev, nous avons un seul serveur de développement.
#
# atlos-dev-waz-01 : Nom logique du serveur (entreprise - env - rôle - index)
# ansible_host : IP réelle de la machine
# ansible_user : Utilisateur SSH pour la connexion
# ansible_python_interpreter : Chemin vers Python 3 sur la cible
#
[wazuh_managers]
atlos-dev-waz-01 ansible_host=172.20.10.4 ansible_user=ansible ansible_python_interpreter=/usr/bin/python3

# ------------------------------------------------------------------------------
# Groupe : linux_servers
# ------------------------------------------------------------------------------
# Ce groupe contient TOUS les serveurs Linux de l'environnement.
# C'est un groupe "parent" qui inclut d'autres groupes via :children
#
# Utilité : Permet de cibler tous les serveurs Linux avec [linux_servers]
# dans les playbooks, sans dupliquer les hôtes.
#
[linux_servers:children]
wazuh_managers

# ------------------------------------------------------------------------------
# Groupe : all
# ------------------------------------------------------------------------------
# Le groupe [all] est implicite et contient tous les hôtes définis dans ce fichier.
# Vous pouvez y ajouter des variables communes à tous les hôtes si nécessaire.
#
# [all:vars]
# ansible_user=ansible
# ansible_python_interpreter=/usr/bin/python3
