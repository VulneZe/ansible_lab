# ==============================================================================
# Variables pour le groupe linux_servers - Environnement PROD
# Entreprise : ATLOS
# ==============================================================================
#
# Ce fichier contient les variables spécifiques aux serveurs Linux
# de l'environnement de production.
#
# IMPORTANT : En production, toutes les configurations doivent être
# sécurisées et validées. Les secrets DOIVENT être chiffrés avec Ansible Vault.
# ==============================================================================

# ------------------------------------------------------------------------------
# Paquets de base pour les serveurs Linux (baseline)
# ------------------------------------------------------------------------------
# Même liste qu'en staging, mais nous pourrions avoir des différences
# si certains paquets ne sont pas nécessaires en production.
linux_baseline_packages:
  - curl
  - wget
  - rsync
  - vim
  - nano
  - htop
  - iotop
  - net-tools
  - traceroute
  - git
  - unzip
  - zip
  - tmux
  - screen
  - tree
  - jq
  - ca-certificates
  - apt-transport-https
  - software-properties-common

# ------------------------------------------------------------------------------
# Configuration SSH
# ------------------------------------------------------------------------------
ssh_port: 22

# EN PRODUCTION : TOUJOURS désactiver l'authentification par mot de passe.
# Utiliser uniquement l'authentification par clé SSH.
ssh_password_authentication: false

# EN PRODUCTION : TOUJOURS interdire la connexion root directe.
ssh_permit_root_login: false

# ------------------------------------------------------------------------------
# Configuration du système
# ------------------------------------------------------------------------------
ulimit_nofile: 65536
ulimit_nproc: 4096

# ------------------------------------------------------------------------------
# Configuration du pare-feu (UFW pour Debian/Ubuntu)
# ------------------------------------------------------------------------------
# EN PRODUCTION : Le pare-feu DOIT être activé.
firewall_enabled: true

firewall_allowed_ports:
  - 80
  - 443

# ------------------------------------------------------------------------------
# Configuration NTP
# ------------------------------------------------------------------------------
ntp_enabled: true

ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org
  - 3.pool.ntp.org

# ------------------------------------------------------------------------------
# Configuration des logs
# ------------------------------------------------------------------------------
log_directory: /var/log/apps

logrotate_enabled: true
logrotate_retention_days: 90  # Rétention plus longue en production

# ------------------------------------------------------------------------------
# Configuration SELinux
# ------------------------------------------------------------------------------
# EN PRODUCTION : SELinux pourrait être activé pour plus de sécurité
selinux_mode: enforcing  # Ou permissive selon la politique de sécurité

# ------------------------------------------------------------------------------
# Configuration AppArmor
# ------------------------------------------------------------------------------
apparmor_enabled: true
