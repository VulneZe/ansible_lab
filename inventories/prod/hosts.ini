# ==============================================================================
# Inventaire Ansible pour l'environnement PROD
# Entreprise : ATLOS
# ==============================================================================
#
# Ce fichier définit les hôtes et les groupes pour l'environnement de production.
# Actuellement, l'environnement prod est vide mais prêt à accueillir des machines.
#
# IMPORTANT : En production, utilisez toujours Ansible Vault pour les secrets.
# Documentation sur les inventaires : https://docs.ansible.com/ansible/latest/inventory_guide/
# ==============================================================================

# ------------------------------------------------------------------------------
# Groupe : linux_servers
# ------------------------------------------------------------------------------
# Ce groupe contiendra TOUS les serveurs Linux de production.
# Pour l'instant, il est vide mais prêt à recevoir des hôtes.
#
# Exemples de noms d'hôtes de production (à ajouter quand les machines seront prêtes) :
# atlos-prod-web-01 ansible_host=192.168.1.10 ansible_user=ansible ansible_python_interpreter=/usr/bin/python3
# atlos-prod-db-01 ansible_host=192.168.1.11 ansible_user=ansible ansible_python_interpreter=/usr/bin/python3
# atlos-prod-app-01 ansible_host=192.168.1.12 ansible_user=ansible ansible_python_interpreter=/usr/bin/python3
#
[linux_servers:children]
# Ajoutez ici les sous-groupes de production quand ils seront créés
# Exemple :
# web_servers
# database_servers
# application_servers

# ------------------------------------------------------------------------------
# Remarques sur l'environnement production
# ------------------------------------------------------------------------------
# - Les configurations doivent être validées en staging avant déploiement
# - Les secrets DOIVENT être chiffrés avec Ansible Vault
# - L'accès est restreint et audité
# - Les sauvegardes sont activées et testées régulièrement
# - Le monitoring est activé avec des alertes configurées
